<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>My Bio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        text-align: center;
      }

      .avatar {
        width: 210px;
        height: 210px;
        border-radius: 50%;
        margin-bottom: 40px;
        object-fit: cover;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 300px;
      }

      .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 28px rgba(220, 39, 67, 0.45);
      }

      .icon {
        width: 20px;
        height: 20px;
        margin-right: 10px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;

        padding: 22px 24px;
        font-size: 18px;
        font-weight: bold;

        color: white;
        text-decoration: none;

        border-radius: 18px;

        background: linear-gradient(
          45deg,
          #f09433,
          #e6683c,
          #dc2743,
          #cc2366,
          #bc1888
        );

        box-shadow: 0 8px 20px rgba(220, 39, 67, 0.35);

        transition: 0.25s;
      }
    </style>
  </head>
